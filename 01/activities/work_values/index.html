<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직업 가치관 검사</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<link rel="stylesheet" href="/d_contents/01/common/common-entry.css">
<style>
/* ===== 활동 고유 변수 ===== */
:root{
  --bg:#eef2fb;--card:#ffffff;--card-hover:#f5f7fe;
  --accent:#4361ee;--accent-dim:rgba(67,97,238,0.12);
  --accent2:#3b82f6;--accent3:#FF6B6B;--accent4:#f59e0b;--accent5:#C084FC;
  --text:#1a1a2e;--text-dim:#64748b;--border:#dde3f0;
}

/* ===== 프롤로그 ===== */
.prologue-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px 24px;text-align:center;margin-bottom:20px}
.prologue-title{font-family:'Jua',cursive;font-size:24px;color:var(--accent);margin-bottom:16px}
.prologue-text{font-size:15px;line-height:1.7;color:var(--text)}
.prologue-hint{font-size:13px;color:var(--text-dim);margin-top:14px}

/* ===== 갈림길 카드 ===== */
.scene-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.scene-header{padding:24px 22px 8px;text-align:center}
.scene-badge{display:inline-block;background:var(--accent-dim);color:var(--accent);font-size:12px;font-weight:700;padding:4px 12px;border-radius:999px;margin-bottom:10px}
.scene-title{font-family:'Jua',cursive;font-size:22px;color:var(--text);margin:0}
.scene-body{padding:8px 22px 24px}
.scene-text{font-size:15px;line-height:1.8;color:var(--text);text-align:center;padding:4px 0 18px}

/* ===== 선택지 ===== */
.choice-list{display:flex;flex-direction:column;gap:10px;padding:0 16px 20px}
.choice-btn{background:#fff;border:2px solid var(--border);border-radius:12px;padding:16px 18px;font-size:14px;line-height:1.5;color:var(--text);cursor:pointer;text-align:left;transition:background .15s,border-color .15s;font-family:inherit;width:100%}
.choice-btn:hover{background:var(--card-hover);border-color:var(--accent)}
.choice-btn.selected{background:var(--accent-dim);border-color:var(--accent)}
.choice-btn:disabled{cursor:not-allowed;opacity:.55}
.choice-btn.selected:disabled{opacity:1}

/* ===== 결과 — TOP3 카드 목록 ===== */
.top3-grid{display:flex;flex-direction:column;gap:10px;margin:14px 0 20px}
.top3-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.top3-card.rank1{border-color:var(--accent4);background:linear-gradient(135deg,rgba(255,215,0,.07),#fff)}
.top3-card.rank2{border-color:var(--accent2);background:linear-gradient(135deg,rgba(77,166,255,.06),#fff)}
.top3-card.rank3{border-color:var(--accent5);background:linear-gradient(135deg,rgba(180,77,255,.05),#fff)}
/* 카드 상단: 이모지(좌) + 메달·이름·태그라인(우) 가로 배치 */
.top3-header{display:flex;align-items:center;gap:12px}
.top3-emoji{font-size:34px;line-height:1;flex-shrink:0}
.top3-title{display:flex;flex-direction:column;gap:2px}
.top3-medal-name{display:flex;align-items:center;gap:5px}
.top3-medal{font-size:18px;line-height:1}
.top3-name{font-family:'Jua',cursive;font-size:18px;color:var(--accent);line-height:1.2}
.top3-tagline{font-size:12px;color:var(--text-dim);font-style:italic}
/* 카드 하단 */
.top3-desc{font-size:12px;line-height:1.55;color:var(--text)}
.top3-strength{font-size:12px;line-height:1.5;color:var(--text);background:var(--accent-dim);padding:8px 10px;border-radius:8px}
.top3-strength b{color:var(--accent)}
.top3-jobs{font-size:11px;line-height:1.5;color:var(--text-dim)}
.top3-jobs b{color:var(--text);display:block;margin-bottom:2px;font-size:12px}

/* ===== 결과 — 점수 막대 차트 ===== */
.chart-container{position:relative;height:380px;margin-top:12px}
.chart-container canvas{display:block}

/* ===== 통계 — 전체 랭킹 바 ===== */
.rank-list-wrap{display:flex;flex-direction:column;gap:2px;margin-top:8px}
.rank-bar-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.rank-bar-item:last-child{border-bottom:none}
.rank-bar-num{font-weight:800;color:var(--accent);min-width:26px;text-align:center;font-size:13px}
.rank-bar-emoji{font-size:16px}
.rank-bar-name{flex:1;font-size:13px;font-weight:500}
.rank-bar-wrap{width:90px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.rank-bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s}
.rank-bar-count{font-size:12px;color:var(--text-dim);min-width:36px;text-align:right}

/* ===== 레이더 레전드 ===== */
.radar-legend{font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:6px}
.radar-legend-row{display:flex;align-items:center;gap:5px}
.radar-legend-dot{display:inline-block;width:10px;height:10px;border-radius:50%}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="screen active" id="entryScreen"></div>
  <div id="user-badge"><span id="badge-code"></span><span class="badge-dot">·</span><span id="badge-school"></span><span class="badge-dot">·</span><span id="badge-nick"></span></div>

  <div class="screen" id="activityScreen">
    <!-- 프롤로그 -->
    <div id="prologueBox" class="prologue-box">
      <div class="prologue-title">진로 갈림길</div>
      <div class="prologue-text" id="prologueText"></div>
      <div class="prologue-hint">✨ 총 8개의 갈림길 · 예상 소요 5분</div>
      <button class="btn btn-primary" style="margin-top:18px;" onclick="beginScenes()">시작하기 →</button>
    </div>

    <!-- 갈림길 진행 (처음엔 숨김) -->
    <div id="sceneArea" style="display:none">
      <div class="progress-wrap">
        <div class="progress-text" id="progressText">1 / 8</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      </div>
      <div id="sceneRender"></div>
    </div>
  </div>

  <div class="screen" id="resultScreen">
    <div class="result-tabs">
      <button class="result-tab active" data-tab="myResult" onclick="switchResultTab('myResult')">나의 결과</button>
      <button class="result-tab" data-tab="groupStats" id="groupStatsTab" onclick="switchResultTab('groupStats')">우리 반 통계</button>
      <button class="result-tab" data-tab="nationalStats" onclick="switchResultTab('nationalStats')">전체 통계</button>
    </div>

    <!-- 나의 결과 -->
    <div class="result-content active" id="myResult">
      <div class="result-card" id="result-card">
        <div class="result-header"><h2>❤️ 나의 직업 가치관</h2><div class="result-name" id="resultName"></div></div>
        <div class="result-section">
          <div class="result-section-title"><span class="icon">🏆</span> 나의 TOP 가치</div>
          <div class="top3-grid" id="top3Grid"></div>
        </div>
        <div class="result-section">
          <div class="result-section-title"><span class="icon">📊</span> 12가지 가치관 점수</div>
          <div class="chart-container"><canvas id="chartMyScores" style="height:380px;"></canvas></div>
        </div>
      </div>
      <div class="bot-comment" id="bot-comment"></div>
      <div class="action-buttons">
        <button class="btn btn-primary" onclick="downloadResult()">📥 이미지 저장</button>
        <button class="btn btn-secondary" onclick="location.reload()">🔄 다시 하기</button>
        <button class="btn btn-secondary" onclick="goHome()">🏠 처음으로</button>
      </div>
    </div>

    <!-- 우리 반 통계 -->
    <div class="result-content" id="groupStats">
      <div class="result-card">
        <div class="result-section-title">📊 우리 반 참여 현황</div>
        <div class="result-stat-item"><span class="result-stat-label">참여자 수</span><span class="result-stat-value" id="group-participants">-</span></div>
        <div class="result-stat-item"><span class="result-stat-label">제출 완료</span><span class="result-stat-value" id="group-submitted">-</span></div>
      </div>
      <div class="result-card">
        <div class="result-section-title">🎯 우리 반 평균 vs 나의 점수</div>
        <div class="radar-legend">
          <div class="radar-legend-row"><span class="radar-legend-dot" style="background:#4361ee"></span>나의 점수</div>
          <div class="radar-legend-row"><span class="radar-legend-dot" style="background:#f59e0b"></span>우리 반 평균</div>
        </div>
        <div class="chart-container" style="height:360px;"><canvas id="chartGroupRadar" style="height:340px;"></canvas></div>
      </div>
      <div style="text-align:center;margin-top:12px;"><button class="btn btn-secondary" id="refreshGroupBtn" onclick="loadGroupStats()">새로고침</button></div>
    </div>

    <!-- 전체 통계 -->
    <div class="result-content" id="nationalStats">
      <div class="result-card">
        <div class="result-section-title">🌍 전체 참여 현황</div>
        <div class="result-stat-item"><span class="result-stat-label">전체 참여자</span><span class="result-stat-value" id="national-participants">-</span></div>
      </div>
      <div class="result-card">
        <div class="result-section-title">🏆 가장 많이 1위로 선택된 가치관</div>
        <div class="rank-list-wrap" id="nationalRankList"><div class="empty-state">아직 데이터가 없습니다</div></div>
      </div>
      <div style="text-align:center;margin-top:12px;"><button class="btn btn-secondary" id="refreshNationalBtn" onclick="loadNationalStats()">새로고침</button></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="/d_contents/01/common/common-entry.js"></script>
<script>

const VALUE_KEYS = VALUES.map(function(v){return v.key;});
const VALUE_MAP = {}; VALUES.forEach(function(v){VALUE_MAP[v.key]=v;});

/* =========================================================
 * 시나리오 8개 — 진로 갈림길
 * ========================================================= */
const PROLOGUE = "지금부터 미래의 \'나\'가 되어 8개의 갈림길에서 선택을 해보자. 정답은 없다. 나의 선택이 쌓여 \'나의 직업 가치관\'이 된다.";

/* =========================================================
 * 상태 관리
 * ========================================================= */
let currentSceneIdx = 0;
let selections = new Array(SCENES.length).fill(null); // 각 장면별 선택된 choiceIdx
let myScores = {};  // {stability:10, salary:8, ...}
let myTop3 = [];    // ['growth','joy','challenge']
let myScoresChart = null;
let groupRadarChart = null;

function show(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

/* =========================================================
 * 프롤로그 → 갈림길 진행
 * ========================================================= */
function startActivity(){
  show('activityScreen');
  document.getElementById('prologueText').textContent = PROLOGUE;
  document.getElementById('prologueBox').style.display = 'block';
  document.getElementById('sceneArea').style.display = 'none';
  currentSceneIdx = 0;
  selections = new Array(SCENES.length).fill(null);
}

function beginScenes(){
  document.getElementById('prologueBox').style.display = 'none';
  document.getElementById('sceneArea').style.display = 'block';
  renderScene(0);
}

function renderScene(idx){
  currentSceneIdx = idx;
  var scene = SCENES[idx];
  var total = SCENES.length;

  // 진행도
  document.getElementById('progressText').textContent = (idx+1) + ' / ' + total;
  document.getElementById('progressFill').style.width = (((idx+1)/total)*100) + '%';

  var selIdx = selections[idx];
  var html = '<div class="scene-card">'
    + '<div class="scene-header">'
    + '<div class="scene-badge">갈림길 ' + (idx+1) + ' / ' + total + '</div>'
    + '<h3 class="scene-title">' + scene.title + '</h3>'
    + '</div>'
    + '<div class="scene-body"><div class="scene-text">' + scene.scene + '</div></div>'
    + '<div class="choice-list">';

  scene.choices.forEach(function(c, ci){
    var sel = selIdx === ci ? ' selected' : '';
    html += '<button class="choice-btn' + sel + '" onclick="selectChoice(' + idx + ',' + ci + ')">'
      + c.text + '</button>';
  });

  html += '</div></div>';
  document.getElementById('sceneRender').innerHTML = html;
  window.scrollTo(0,0);
}

function selectChoice(sceneIdx, choiceIdx){
  // 이미 선택 처리 중이면 무시
  var buttons = document.querySelectorAll('#sceneRender .choice-btn');
  if(buttons.length && buttons[0].disabled) return;

  selections[sceneIdx] = choiceIdx;

  // 시각 피드백 — 선택된 것만 하이라이트, 나머지 비활성
  buttons.forEach(function(b, bi){
    b.classList.remove('selected');
    if(bi === choiceIdx) b.classList.add('selected');
    b.disabled = true;
  });

  // 0.5초 후 자동 진행
  setTimeout(function(){
    if(sceneIdx < SCENES.length - 1){
      renderScene(sceneIdx + 1);
    } else {
      finishActivity();
    }
  }, 500);
}

/* =========================================================
 * 점수 계산 & 결과
 * ========================================================= */
function calculateScores(){
  var scores = {};
  VALUE_KEYS.forEach(function(k){scores[k]=0;});
  selections.forEach(function(choiceIdx, sceneIdx){
    if(choiceIdx === null) return;
    var w = SCENES[sceneIdx].choices[choiceIdx].weights;
    Object.keys(w).forEach(function(k){
      scores[k] = (scores[k]||0) + w[k];
    });
  });
  return scores;
}

function finishActivity(){
  myScores = calculateScores();
  // TOP3 계산 (동점 시 VALUES 배열 순서로)
  var sorted = VALUE_KEYS.slice().sort(function(a,b){
    if(myScores[b] !== myScores[a]) return myScores[b] - myScores[a];
    return VALUE_KEYS.indexOf(a) - VALUE_KEYS.indexOf(b);
  });
  myTop3 = sorted.slice(0,3);

  show('resultScreen');
  if(EoEntry.state.mode !== 'group'){
    var groupTab = document.getElementById('groupStatsTab');
    if(groupTab) groupTab.style.display = 'none';
  }
  showMyResult();
  saveResult();
}

function showMyResult(){
  var s = EoEntry.state;
  document.getElementById('resultName').textContent = (s.nickname || '') + '의 직업 가치관';

  // TOP3 카드 (1~3위, 이모지 좌측 + 메달·이름·태그라인 우측 가로 배치)
  var medals = ['🥇','🥈','🥉'];
  var rankCls = ['rank1','rank2','rank3'];
  var gridHtml = '';
  myTop3.forEach(function(key, i){
    var v = VALUE_MAP[key];
    gridHtml += '<div class="top3-card ' + rankCls[i] + '">'
      + '<div class="top3-header">'
      +   '<div class="top3-emoji">' + v.emoji + '</div>'
      +   '<div class="top3-title">'
      +     '<div class="top3-medal-name"><span class="top3-medal">' + medals[i] + '</span><span class="top3-name">' + v.name + '</span></div>'
      +     '<div class="top3-tagline">' + v.tagline + '</div>'
      +   '</div>'
      + '</div>'
      + '<div class="top3-desc">' + v.description + '</div>'
      + '<div class="top3-strength"><b>나의 강점 · </b>' + v.strength + '</div>'
      + '<div class="top3-jobs"><b>어울리는 직업</b>' + v.jobs.join(' · ') + '</div>'
      + '</div>';
  });
  document.getElementById('top3Grid').innerHTML = gridHtml;

  // 12가치관 막대 차트
  renderMyScoresChart();

  // 멘트
  var top3Names = myTop3.map(function(k){return VALUE_MAP[k].name;});
  document.getElementById('bot-comment').innerHTML =
    '<strong>' + s.nickname + '</strong> 님이 중요하게 생각하는 직업 가치는 <strong>'
    + top3Names.join(' · ') + '</strong>이야!<br><br>'
    + '직업을 선택할 때 이 가치들이 얼마나 충족되는지 꼭 확인해 봐! 💪';
}

function renderMyScoresChart(){
  if(myScoresChart){myScoresChart.destroy();}
  // 점수 내림차순 정렬
  var sorted = VALUE_KEYS.slice().sort(function(a,b){return myScores[b]-myScores[a];});
  var labels = sorted.map(function(k){return VALUE_MAP[k].emoji + ' ' + VALUE_MAP[k].name;});
  var data = sorted.map(function(k){return myScores[k];});
  var bgColors = sorted.map(function(k,i){
    if(i===0) return '#f59e0b';
    if(i===1) return '#3b82f6';
    if(i===2) return '#C084FC';
    return '#94a3b8';
  });

  myScoresChart = new Chart(document.getElementById('chartMyScores'), {
    type:'bar',
    data:{labels:labels, datasets:[{label:'점수', data:data, backgroundColor:bgColors, borderWidth:0, barThickness:10}]},
    options:{
      indexAxis:'y',
      responsive:true,
      maintainAspectRatio:false,
      devicePixelRatio: (window.devicePixelRatio || 1) * 2,
      layout:{padding:{right:36}},
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:function(c){return c.parsed.x + '점';}}},
        datalabels:{
          anchor:'end',
          align:'end',
          formatter:function(value){return value + '점';},
          font:{size:11, weight:'500'},
          color:'#64748b'
        }
      },
      scales:{
        x:{beginAtZero:true, max:15, ticks:{stepSize:3, font:{size:11}}, grid:{color:'rgba(0,0,0,0.05)'}},
        y:{ticks:{font:{size:12}, autoSkip:false}, grid:{display:false}}
      }
    }
  });
}

/* =========================================================
 * 결과 저장 & 통계 로드
 * ========================================================= */
async function saveResult(){
  try{
    await fetch(EoEntry.API_BASE + '/result.php?action=submit', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        participant_id: EoEntry.state.participantId,
        activity_id:'work_values',
        group_id: EoEntry.state.groupId || null,
        result_data:{
          scores: myScores,
          top3: myTop3,
          selections: selections,
          context: EoEntry.state.context || null,
          timestamp: new Date().toISOString()
        }
      })
    });
  }catch(e){console.error('Save error:', e);}
}

async function loadGroupStats(){
  EoEntry.refreshCooldown('refreshGroupBtn');
  try{
    var res = await fetch(EoEntry.API_BASE + '/result.php?action=group&group_id='
      + EoEntry.state.groupId + '&activity_id=work_values');
    var data = await res.json();
    document.getElementById('group-participants').textContent = (data.total_participants||0) + '명';
    document.getElementById('group-submitted').textContent = (data.submitted_count||0) + '명';
    renderGroupRadarChart(data.value_avg_scores || {});
  }catch(e){console.error('Group stats error:', e);}
}

function renderGroupRadarChart(avgScores){
  if(groupRadarChart){groupRadarChart.destroy();}
  var labels = VALUE_KEYS.map(function(k){return VALUE_MAP[k].name;});
  var myData = VALUE_KEYS.map(function(k){return myScores[k]||0;});
  var avgData = VALUE_KEYS.map(function(k){return avgScores[k]||0;});

  groupRadarChart = new Chart(document.getElementById('chartGroupRadar'), {
    type:'radar',
    data:{labels:labels, datasets:[
      {label:'나의 점수', data:myData, borderColor:'#4361ee', backgroundColor:'rgba(67,97,238,0.15)', borderWidth:2, pointRadius:3, pointBackgroundColor:'#4361ee'},
      {label:'우리 반 평균', data:avgData, borderColor:'#f59e0b', backgroundColor:'rgba(245,158,11,0.10)', borderWidth:2, pointRadius:3, pointBackgroundColor:'#f59e0b'}
    ]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{r:{
        min:0, max:12,
        ticks:{stepSize:3, display:false},
        pointLabels:{font:{size:10}},
        grid:{color:'rgba(0,0,0,0.08)'},
        angleLines:{color:'rgba(0,0,0,0.08)'}
      }}
    }
  });
}

async function loadNationalStats(){
  EoEntry.refreshCooldown('refreshNationalBtn');
  try{
    var res = await fetch(EoEntry.API_BASE + '/result.php?action=national&activity_id=work_values');
    var data = await res.json();
    document.getElementById('national-participants').textContent = (data.total_participants||0) + '명';
    renderNationalRankList(data.value_top1_counts || {});
  }catch(e){console.error('National stats error:', e);}
}

function renderNationalRankList(top1Counts){
  var entries = Object.keys(top1Counts).map(function(k){return {key:k, count:top1Counts[k]||0};});
  entries.sort(function(a,b){return b.count - a.count;});
  var total = entries.reduce(function(s,e){return s+e.count;},0);

  if(total === 0){
    document.getElementById('nationalRankList').innerHTML = '<div class="empty-state">아직 데이터가 없습니다</div>';
    return;
  }

  var maxCount = entries[0].count;
  var html = '';
  entries.forEach(function(e, i){
    var v = VALUE_MAP[e.key];
    if(!v) return;
    var pct = maxCount > 0 ? Math.round((e.count/maxCount)*100) : 0;
    html += '<div class="rank-bar-item">'
      + '<span class="rank-bar-num">' + (i+1) + '</span>'
      + '<span class="rank-bar-emoji">' + v.emoji + '</span>'
      + '<span class="rank-bar-name">' + v.name + '</span>'
      + '<span class="rank-bar-wrap"><span class="rank-bar-fill" style="width:' + pct + '%"></span></span>'
      + '<span class="rank-bar-count">' + e.count + '명</span>'
      + '</div>';
  });
  document.getElementById('nationalRankList').innerHTML = html;
}

/* =========================================================
 * 결과 탭 전환 / 이미지 저장 / 홈 이동
 * ========================================================= */
function switchResultTab(tabName){
  document.querySelectorAll('.result-tab').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('.result-content').forEach(function(c){c.classList.remove('active')});
  document.querySelector('[data-tab="'+tabName+'"]').classList.add('active');
  document.getElementById(tabName).classList.add('active');
  if(tabName === 'groupStats') loadGroupStats();
  if(tabName === 'nationalStats') loadNationalStats();
}

async function downloadResult(){
  try{
    var dpr = window.devicePixelRatio || 1;
    var badge = document.getElementById('user-badge');
    var prevBadge = badge ? badge.style.display : '';
    if(badge) badge.style.display = 'none';
    var canvas = await html2canvas(document.getElementById('result-card'), {
      backgroundColor:'#f5f8ff', scale: dpr * 2, useCORS:true, logging:false,
      scrollX:0, scrollY:-window.scrollY
    });
    if(badge) badge.style.display = prevBadge;
    var link = document.createElement('a');
    link.download = '가치관_' + EoEntry.state.nickname + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }catch(e){alert('이미지 저장에 실패했습니다.');}
}

function goHome(){
  var ctx = EoEntry.state.context;
  if(ctx === 'high'){location.href='/d_contents/01/high/';}
  else if(ctx === 'middle'){location.href='/d_contents/01/middle/';}
  else{location.href='/d_contents/01/middle/';}
}
